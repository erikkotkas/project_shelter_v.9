<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="room1.css">
  <link rel="stylesheet" href="general.css">
  <link rel="stylesheet" href="context-menu.css">
  <link rel="stylesheet" href="https://use.typekit.net/bao6qio.css">
</head>

<body>
  <div id="page-fade" class="is-active" ></div>

<aside id="context-menu" class="context-menu">
  <div class="context-menu-header">
    <div class="context-menu-title" id="ctx-title"></div>
    <button class="context-menu-close" id="ctx-close">X</button>
  </div>
  <div class="context-menu-link">Links to: <span id="ctx-link-label"></span></div>
  <div class="context-menu-desc" id="ctx-desc"></div>
  <div class="context-menu-actions">
    <button class="btn" id="ctx-visit">VISIT</button>
  </div>
</aside>

  <div class="background-container">
    <button onclick="back()" class="back">&larr; Back</button>

    <img class="bunker-background flipped" src="images/room_shell_new.svg">

    <div class="b1-container" onclick="openContext({ name: 'SOFA', linkLabel: 'Graphic Design Lounge', desc: 'A curated resource for graphic design inspiration and industry examples. Use when researching visual directions or benchmarking design quality.', url: 'https://www.graphicdesignerlounge.com' })">
      <div class="b1">
        <img class="sofa" src="images/sofa button copy.png">
        <div class="tool-tip">Graphic Design lounge</div>
      </div>
    </div>

    <img src="images/shelf copy.png" class="shelf">

    <div class="b2-container" onclick="openContext({ name: 'TABLE', linkLabel: 'Vev Design — Case Studies', desc: 'A collection of interactive and editorial design case studies. Use when looking for design references.', url: 'https://www.vev.design/blog/case-study-design-examples/' })">
      <div class="b2">
        <img class="table" src="images/table button copy.png">
        <div class="tool-tip">Table</div>
      </div>
    </div>

    <div class="b3-container" onclick="openContext({ name: 'SHELVES', linkLabel: 'Vev Design — Case Studies', desc: 'Secondary shelf reference to Vev design case studies. Use as an alternate entry point for design browsing.', url: 'https://www.vev.design/blog/case-study-design-examples/' })">
      <div class="b3">
        <img class="shelf-button" src="images/r1 shelf button copy.png">
        <div class="tool-tip">Shelves</div>
      </div>
    </div>
  </div>

  
<script>

  const fade = document.getElementById("page-fade");

  window.addEventListener("pageshow", (event) => {
    if (event.persisted) {
      fade.style.transition = "none";
      fade.classList.remove("is-active");
      fade.offsetHeight;
      fade.style.transition = "";
      return;
    }

    setTimeout(() => {
      fade.classList.remove("is-active");
    }, 100);
  });

  function fadeToPage(url) {
    fade.classList.add("is-active");

    setTimeout(() => {
      window.location.href = url;
    }, 500);
  }

  function back() {
    fadeToPage("index.html");
  }



  function fadeToPage(url) {
    sessionStorage.setItem("fade-transition", "true");

    fade.style.transition = "";
    fade.classList.add("is-active");

    setTimeout(() => {
      window.location.href = url;
    }, 500);
  }

  function back() {
    fadeToPage("index.html");
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') fadeToPage('index.html');
  });

  let currentUrl = '#';
  function openContext(data) {
    document.getElementById('ctx-title').textContent = data.name;
    document.getElementById('ctx-link-label').textContent = data.linkLabel;
    document.getElementById('ctx-desc').textContent = data.desc;
    currentUrl = data.url;
    document.getElementById('context-menu').classList.add('is-open');
  }
  document.getElementById('ctx-close').addEventListener('click', () => {
    document.getElementById('context-menu').classList.remove('is-open');
  });
  document.getElementById('ctx-visit').addEventListener('click', () => {
    window.open(currentUrl, '_blank', 'noopener noreferrer');
  });
  document.addEventListener('click', (e) => {
    const menu = document.getElementById('context-menu');
    if (!menu.contains(e.target) && !e.target.closest('.b1-container, .b2-container, .b3-container')) {
      menu.classList.remove('is-open');
    }
  });

  function changeRoom1() {
    fadeToPage("room1.html");
  }

  function changeRoom2() {
    fadeToPage("room2.html");
  }

  function changeRoom3() {
    fadeToPage("room3.html");
  }

  function changeRoom4() {
    fadeToPage("room4.html");
  }

  function changeRoomHome() {
    fadeToPage("index.html");
  }
</script>
</body>
</html>
